# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - testjamesblondnodejs

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: npm install, build, and test
        run: |
          npm install --legacy-peer-deps
          npm run build --if-present
          # Skip tests during deployment to speed things up
          # npm run test --if-present

      - name: Debug environment
        run: |
          echo "Node version: $(node -v)"
          echo "NPM version: $(npm -v)"
          echo "Directory listing:"
          ls -la

      - name: Optimize for deployment
        run: |
          # Remove unnecessary files to reduce package size
          rm -rf .git .github
          rm -rf node_modules/.cache

      - name: Zip artifact for deployment
        run: zip -r release.zip . -x "node_modules/.cache/*" "node_modules/.bin/*"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Unzip artifact for deployment
        run: unzip release.zip
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_FCDCD49A8ADF4EBFA8A2133A38D1A272 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_4E48D086B01E4967B72B8D1E7317C619 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_A1F4D8D1FDEF48D8ADC72487444545E5 }}

      - name: Debug environment before deployment
        run: |
          echo "Files to be deployed:"
          ls -la

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'testjamesblondnodejs'
          slot-name: 'Production'
          package: .
          timeout-in-ms: 300000 # Increase timeout to 5 minutes (300000ms)

      - name: Logout from Azure
        run: az logout
        if: always()
